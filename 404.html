<!DOCTYPE html>
<html lang="ar-SA" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة غير موجودة | وكالة روّج.برو</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/webp" href="smalll.webp">
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800;900&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; background: #f8f9fa; margin: 0; }
        h1 { font-size: 6rem; color: #8e2b6b; margin-bottom: 10px; font-weight: 900; }
        p { font-size: 1.4rem; color: #555; margin-bottom: 40px; }
        .btn-p { display: inline-flex; align-items: center; justify-content: center; background: linear-gradient(90deg,#8e2b6b,#d150a2); color: #fff; padding: 16px 34px; border-radius: 9px; font-weight: 800; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 28px rgba(142,43,107,0.35); transition: transform 0.35s, box-shadow 0.35s; }
        .btn-p:hover { transform: translateY(-3px); box-shadow: 0 16px 36px rgba(209,80,162,0.5); }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>عفواً، الصفحة التي تبحث عنها غير موجودة أو ربما تم نقلها.</p>
    <a href="/" class="btn-p">العودة للرئيسية</a>
</body>
</html>
